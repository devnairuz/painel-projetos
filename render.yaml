# Deploy da API (Express) no Render. Conecte o repositório e o Render lê este arquivo.
# As variáveis com sync:false você preenche no painel do Render (não vão no git).
services:
  - type: web
    name: nairuz-portal-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # E-mail via Resend (HTTP) — código de verificação. Preencha no Render.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # Naira: disabled até a homologação receber o contrato/segredos reais.
      - key: NAIRA_MODE
        value: disabled
      - key: NAIRA_BASE_URL
        sync: false
      - key: NAIRA_API_KEY
        sync: false
      - key: NAIRA_CALLBACK_URL
        sync: false
      - key: NAIRA_CALLBACK_SECRET
        sync: false
      - key: NAIRA_M2M_TOKEN
        sync: false
